services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: openbrain
    ports:
      - "5432:5432"
    volumes:
      - openbrain_pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d openbrain"]
      interval: 5s
      timeout: 3s
      retries: 20

  openbrain:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/openbrain
      OPENBRAIN_BIND: 0.0.0.0
      OPENBRAIN_PORT: "8080"
      OPENBRAIN_EMBED_PROVIDER: fake
      RUN_OPENAI_LIVE_TESTS: "0"
      RUN_ANTHROPIC_LIVE_TESTS: "0"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -X POST http://127.0.0.1:8080/v1/ping -H 'Content-Type: application/json' -d '{}' >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  openbrain_pgdata:
